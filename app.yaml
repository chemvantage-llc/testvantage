runtime: java17

automatic_scaling:
  min_instances: 0
  max_instances: 10

env_variables:
  CHEMVANTAGE_URL: 'https://www.chemvantage.org'

# Security: All endpoints restricted to admin users and authorized service accounts
# Allowed projects: test-vantage, dev-vantage-hrd, chem-vantage-hrd
# Allowed service accounts: Default Service Account (@appspot.gserviceaccount.com)
# Note: Additional IAM restrictions should be applied at the project level to enforce
# service account and project-level access controls

handlers:
# Test endpoints - public access for external testing (no admin login required)
- url: /test/.*
  script: auto
  secure: always
  redirect_http_response_code: 301

# Home page - public access for navigation
- url: /$
  script: auto
  secure: always
  redirect_http_response_code: 301

# ChemVantage callback endpoints - public access (authentication via LTI 1.3 JWT)
- url: /registration
  script: auto
  secure: always
  redirect_http_response_code: 301

- url: /lti/.*
  script: auto
  secure: always
  redirect_http_response_code: 301

# All other endpoints - require admin authentication
- url: /.*
  script: auto
  secure: always
  redirect_http_response_code: 301
  login: admin
