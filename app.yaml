runtime: java21

automatic_scaling:
  min_instances: 0
  max_instances: 10

env_variables:
  CHEMVANTAGE_URL: 'https://www.chemvantage.org'

# Security: All endpoints restricted to admin users and authorized service accounts
# Allowed projects: test-vantage, dev-vantage-hrd, chem-vantage-hrd
# Allowed service accounts: Default Service Account (@appspot.gserviceaccount.com)
# Note: Additional IAM restrictions should be applied at the project level to enforce
# service account and project-level access controls

handlers:
- url: /.*
  script: auto
  secure: always
  redirect_http_response_code: 301
  login: admin
